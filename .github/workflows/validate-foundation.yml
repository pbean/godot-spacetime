name: Validate Foundation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  foundation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run shared foundation validation lane
        run: python3 scripts/compatibility/validate-foundation.py
